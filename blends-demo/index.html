<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="blends.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            min-height: 100dvh;
        }
        
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        select {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, 50%);
        }
    </style>
</head>
<body class="light blue">
    <svg viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <filter id="filter" x="0" y="0" width="1920" height="1080" filterUnits="userSpaceOnUse">
                <feGaussianBlur stdDeviation="118.125" />
            </filter>
            <linearGradient id="fill" x1="-33.7891" y1="47.2691" x2="1913.78" y2="1090.86"
                gradientUnits="userSpaceOnUse">
                <stop/>
                <stop offset="0.22"/>
                <stop offset="0.619267"/>
                <stop offset="0.993911"/>
            </linearGradient>
        </defs>
        <g filter="url(#filter)">
            <path
                d="M-852.491 -233.863C-757.825 -1026.26 750.242 -1349.11 1336.39 -439.906C2256.03 986.577 -172.647 967.304 535.586 1784.05C973.518 2289.08 1203.02 2070.93 1844.17 1722.9C2485.32 1374.86 1522.28 301.936 1092.04 536.611C449.359 887.165 -947.156 558.536 -852.491 -233.863Z"
                fill="url(#fill)" />
        </g>
    </svg>
    <select>
        <option disabled selected value="">Choose a color</option>
        <optgroup label="light">
            <option value="light blue">blue</option>
            <option value="light red">red</option>
            <option value="light green">green</option>
            <option value="light yellow">yellow</option>
            <option value="light purple">purple</option>
        </optgroup>
        <optgroup label="dark">
            <option value="dark blue">blue</option>
            <option value="dark red">red</option>
            <option value="dark green">green</option>
            <option value="dark yellow">yellow</option>
            <option value="dark purple">purple</option>
        </optgroup>
    </select>

    <script>
        let select = document.getElementsByTagName('select')[0];
        
        const updateClasses = () => {
            let newClasses = select.value.split(" ");

            if (newClasses[0]) {
                document.body.classList.value = "";
                newClasses.forEach((e) => {
                    document.body.classList.add(e);
                });
            }
        };
        
        window.addEventListener('load', updateClasses);
        select.addEventListener('change', updateClasses);
    </script>
</body>
</html>
